<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Greeting</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    background: url('raya.jpg') center/cover no-repeat;
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* overlay gradient */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.6));
    z-index: -1;
}

/* particles */
.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: white;
    opacity: 0.5;
    border-radius: 50%;
    animation: float 10s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* pages */
.page {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
}

.active {
    display: flex;
}

/* glass card */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    text-align: center;
}

/* image */
.jokowi {
    width: 280px;
    border-radius: 20px;
    opacity: 0;
    transform: translateY(-200px);
    animation: drop 1.5s ease forwards;
}

@keyframes drop {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* tap text */
.tap {
    margin-top: 20px;
    font-size: 16px;
    letter-spacing: 2px;
    opacity: 0;
    animation: fadeBlink 2s infinite;
}

@keyframes fadeBlink {
    0%,100% {opacity: 0;}
    50% {opacity: 1;}
}

/* paper */
.paper {
    width: 90%;
    max-width: 600px;
    height: 80%;
    background: rgba(255,255,255,0.95);
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    font-family: 'Playfair Display', serif;
    color: #333;
    position: relative;
    overflow-y: auto;
}

/* margin line */
.paper::before {
    content: "";
    position: absolute;
    left: 40px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #d33;
}

/* lines */
.paper {
    background-image: linear-gradient(#ddd 1px, transparent 1px);
    background-size: 100% 28px;
}

/* text */
.text {
    margin-left: 50px;
    line-height: 28px;
    white-space: pre-line;
}

/* animation */
.fade {
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.95);}
    to {opacity: 1; transform: scale(1);}
}

</style>
</head>

<body>

<audio id="music" src="ied.mp3" loop></audio>

<!-- particles -->
<script>
for(let i=0;i<40;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"%";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
}
</script>

<!-- PAGE 1 -->
<div class="page active" id="p1">
    <div class="card">
        <img src="jokowi.jpg" class="jokowi">
        <div class="tap" id="tap1">TAP TO CONTINUE</div>
    </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
    <div class="paper fade">
        <div class="text" id="poem"></div>
        <div class="tap" id="tap2">TAP TO CONTINUE</div>
    </div>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
    <div class="paper fade">
        <div class="text" id="final"></div>
    </div>
</div>

<script>

const music = document.getElementById("music");

function typeWriter(text, el, speed, done){
    let i=0;
    function t(){
        if(i<text.length){
            el.innerHTML += text[i];
            i++;
            setTimeout(t,speed);
        } else if(done){ done(); }
    }
    t();
}

const poem = `Maybe we should open with poetry first, I found a good poem :

Come to me like a spring day holding
Cherry blossoms, and give me a
Midsummer tropical night.

Before the fox rain of autumn wets the
Maple leaves, make me forget how to
Face the wistful scenery alone.

Please become my weakness
So the coming winter won't be cold,
I offer you my heart.
`;

const finalMsg = `Today I humble myself, forget my pride, bow my head, and sit transfixed before the window of your heart, waiting for the door of your forgiveness to open for me.

Happy Eid al-Fitr, Mohon maaf lahir dan batin.

- by awa labil`;

setTimeout(()=> tap1.style.opacity=1,1500);

p1.onclick=()=>{
    music.play();
    p1.classList.remove("active");
    p2.classList.add("active");

    typeWriter(poem, poemEl, 30, ()=>{
        tap2.style.opacity=1;
    });
};

p2.onclick=()=>{
    if(tap2.style.opacity==1){
        p2.classList.remove("active");
        p3.classList.add("active");
        typeWriter(finalMsg, finalEl, 30);
    }
};

const poemEl=document.getElementById("poem");
const finalEl=document.getElementById("final");

</script>

</body>
</html>
